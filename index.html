<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruise'N'Pass — Driving Lessons in Manchester</title>
    <meta name="description" content="DVSA-approved driving instructor in Manchester. Manual &amp; automatic lessons. 89% first-time pass rate. Calm, structured, patient teaching.">
    <meta name="theme-color" content="#ffffff">

    <meta property="og:title" content="Cruise'N'Pass — Driving Lessons in Manchester">
    <meta property="og:description" content="DVSA-approved driving instructor. 89% first-time pass rate. Calm, patient teaching.">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --bg-soft: #fafaf9;
            --bg-warm: #f5f4f1;
            --ink: #0a0a0a;
            --ink-soft: #404040;
            --ink-muted: #737373;
            --line: #e7e5e0;
            --line-strong: #d6d3cd;
            --accent: #d97706;
            --accent-soft: #fef3c7;
            --success: #15803d;
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--ink);
            background: var(--bg);
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-feature-settings: 'cv11', 'ss01';
        }

        h1, h2, h3, h4, h5 {
            font-weight: 700;
            line-height: 1.05;
            letter-spacing: -0.035em;
            color: var(--ink);
            margin: 0;
        }

        h1 { font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 700; letter-spacing: -0.05em; }
        h2 { font-size: clamp(2.25rem, 5.5vw, 4.5rem); letter-spacing: -0.04em; }
        h3 { font-size: clamp(1.5rem, 2.5vw, 2rem); letter-spacing: -0.025em; }
        h4 { font-size: 1.25rem; }

        a { color: inherit; text-decoration: none; }
        p { color: var(--ink-soft); }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
        }

        .container-narrow {
            max-width: 880px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* Skip link */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 0;
            background: var(--ink);
            color: white;
            padding: 12px 20px;
            z-index: 1000;
        }
        .skip-link:focus { top: 0; }

        /* Buttons — minimal, no rounded pills */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 28px;
            border-radius: 0;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.15s ease;
            font-family: inherit;
            letter-spacing: -0.01em;
        }
        .btn-primary {
            background: var(--ink);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent);
        }
        .btn-secondary {
            background: transparent;
            color: var(--ink);
            border: 1.5px solid var(--ink);
        }
        .btn-secondary:hover {
            background: var(--ink);
            color: white;
        }
        .btn-text {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            font-size: 15px;
            padding: 4px 0;
            border-bottom: 1.5px solid currentColor;
            transition: gap 0.2s;
        }
        .btn-text:hover { gap: 12px; }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: saturate(180%) blur(16px);
            -webkit-backdrop-filter: saturate(180%) blur(16px);
            border-bottom: 1px solid var(--line);
        }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 76px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.02em;
        }
        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--ink);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }
        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            color: var(--ink-soft);
            transition: color 0.15s;
            letter-spacing: -0.005em;
        }
        .nav-links a:hover { color: var(--ink); }
        .nav-cta {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .nav-phone {
            font-size: 14px;
            font-weight: 500;
            color: var(--ink);
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            padding: 8px;
            cursor: pointer;
        }
        .nav-toggle span {
            display: block;
            width: 24px;
            height: 1.5px;
            background: var(--ink);
            margin: 6px 0;
        }

        /* Hero */
        .hero {
            padding: 120px 0 80px;
            position: relative;
            overflow: hidden;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 80px;
            align-items: center;
        }
        .hero-eyebrow {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-soft);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 32px;
        }
        .hero-eyebrow span {
            display: inline-block;
            width: 24px;
            height: 1px;
            background: var(--ink);
            vertical-align: middle;
            margin-right: 12px;
        }
        .hero h1 {
            margin-bottom: 32px;
        }
        .hero h1 em {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-weight: 400;
            color: var(--accent);
        }
        .hero p.lead {
            font-size: 19px;
            line-height: 1.5;
            color: var(--ink-soft);
            max-width: 480px;
            margin: 0 0 40px;
        }
        .hero-actions {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            margin-top: 80px;
            padding-top: 48px;
            border-top: 1px solid var(--line);
        }
        .stat-num {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 13px;
            color: var(--ink-muted);
            letter-spacing: 0.02em;
        }

        /* Hero image */
        .hero-image {
            position: relative;
            aspect-ratio: 4/5;
            background: var(--bg-warm);
            background-image: url('https://images.unsplash.com/photo-1449965408869-ebd3fee7710d?w=1200&q=80');
            background-size: cover;
            background-position: center;
        }
        .hero-image::after {
            content: '';
            position: absolute;
            top: 24px;
            left: 24px;
            right: -24px;
            bottom: -24px;
            border: 1px solid var(--ink);
            z-index: -1;
        }
        .hero-image-caption {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            background: white;
            padding: 16px 20px;
            font-size: 13px;
            color: var(--ink-soft);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .hero-image-caption strong {
            display: block;
            color: var(--ink);
            font-size: 14px;
            font-weight: 600;
        }

        /* Sections */
        section { padding: 120px 0; }

        .section-eyebrow {
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 20px;
        }
        .section-head {
            max-width: 760px;
            margin-bottom: 80px;
        }
        .section-head h2 { margin-bottom: 20px; }
        .section-head p {
            font-size: 19px;
            color: var(--ink-soft);
            max-width: 560px;
        }
        .section-head.center { margin: 0 auto 80px; text-align: center; }
        .section-head.center p { margin: 0 auto; }

        /* Pricing — editorial table style */
        .pricing-list {
            border-top: 1px solid var(--ink);
        }
        .pricing-row {
            display: grid;
            grid-template-columns: 80px 2fr 1fr 1.2fr auto;
            gap: 32px;
            padding: 32px 0;
            border-bottom: 1px solid var(--line);
            align-items: center;
            transition: background 0.2s, padding 0.2s;
        }
        .pricing-row:hover {
            background: var(--bg-warm);
            padding-left: 24px;
            padding-right: 24px;
        }
        .pricing-row.featured {
            background: var(--ink);
            color: white;
            padding-left: 24px;
            padding-right: 24px;
        }
        .pricing-row.featured:hover { background: var(--ink); }
        .pricing-row.featured .row-desc,
        .pricing-row.featured .row-features,
        .pricing-row.featured .row-num { color: rgba(255, 255, 255, 0.7); }
        .pricing-row.featured .row-name { color: white; }
        .pricing-row.featured .row-price { color: white; }
        .pricing-row.featured .row-badge { background: var(--accent); color: var(--ink); }

        .row-num {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-size: 32px;
            color: var(--ink-muted);
        }
        .pricing-row.featured .row-num { color: var(--accent); }

        .row-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }
        .row-name small {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-muted);
            margin-top: 4px;
            letter-spacing: 0;
        }
        .row-desc {
            color: var(--ink-soft);
            font-size: 15px;
            line-height: 1.5;
        }
        .row-features {
            font-size: 13px;
            color: var(--ink-muted);
            line-height: 1.7;
        }
        .row-price {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .row-price small {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-muted);
        }
        .row-badge {
            display: inline-block;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-left: 8px;
        }

        /* About — editorial split */
        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 100px;
            align-items: flex-start;
        }
        .about-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 32px;
        }
        .about h2 { margin-bottom: 40px; }
        .about p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: var(--ink-soft);
        }
        .about-image {
            aspect-ratio: 4/5;
            background-image: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=1000&q=80');
            background-size: cover;
            background-position: center;
            margin-bottom: 32px;
        }
        .credentials {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--line);
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .credential {
            background: white;
            padding: 24px 0;
        }
        .credential-num {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-size: 32px;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 8px;
        }
        .credential-text {
            font-size: 14px;
            line-height: 1.4;
        }
        .credential-text strong {
            display: block;
            color: var(--ink);
            font-weight: 600;
            font-size: 15px;
        }
        .credential-text span { color: var(--ink-muted); }

        /* Testimonials — large pull-quote style */
        .testimonials {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--line);
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .testimonial {
            background: white;
            padding: 48px 32px;
            display: flex;
            flex-direction: column;
        }
        .testimonial-quote {
            font-size: 22px;
            line-height: 1.4;
            letter-spacing: -0.015em;
            color: var(--ink);
            margin: 0 0 40px;
            flex: 1;
            font-weight: 500;
        }
        .testimonial-quote::before {
            content: '"';
            font-family: 'Instrument Serif', serif;
            font-size: 60px;
            color: var(--accent);
            line-height: 0.5;
            display: block;
            margin-bottom: 16px;
        }
        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid var(--line);
        }
        .testimonial-author .avatar {
            width: 40px;
            height: 40px;
            background: var(--ink);
            color: var(--accent);
            display: flex;
